# MySQL 8 para el backend (perfil Spring: docker → localhost:3307).
# Secretos solo en archivo .env (no subir .env al repositorio).
name: unidos-por-los-animales-db

services:
  mysql:
    image: mysql:8.0
    container_name: backend-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

volumes:
  mysql_data:
