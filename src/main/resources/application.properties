spring.application.name=backend

# MySQL: no declarar usuario/contraseña aquí (Sonar S2068 / Blocker con spring.datasource.password).
# Spring Boot asigna por binding relajado: SPRING_DATASOURCE_USERNAME y SPRING_DATASOURCE_PASSWORD.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.url=jdbc:mysql://localhost:3306/mydatabase
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT: en producción definir JWT_SECRET (mínimo 32 caracteres UTF-8)
app.jwt.secret=${JWT_SECRET:DevOnly_Change_In_Production_Min32Chars_Key!!}

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.root=INFO
logging.file.name=backend.log
server.port=8180